# Deployment â€” runs the official ingress-nginx error pages image.
# It serves /www/<status-code>.html, populated from the ConfigMap above.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-errors
  labels:
    app.kubernetes.io/name: custom-errors
    app.kubernetes.io/part-of: ingress-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: custom-errors
      app.kubernetes.io/part-of: ingress-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: custom-errors
        app.kubernetes.io/part-of: ingress-nginx
    spec:
      containers:
        - name: nginx-error-server
          image: registry.k8s.io/ingress-nginx/nginx-errors:v20230505@sha256:3600dcd1bbd0d05959bb01af4b272714e94d22d24a64e91838e7183c80e53f7f
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: custom-error-pages
              mountPath: /www
          securityContext:
            runAsUser: 10000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: custom-error-pages
          configMap:
            name: custom-error-pages
---
# Service â€” exposes the custom-errors deployment as 'custom-errors' on port 80.
# Referenced by the ingress annotation: default-backend: custom-errors
apiVersion: v1
kind: Service
metadata:
  name: custom-errors
  labels:
    app.kubernetes.io/name: custom-errors
    app.kubernetes.io/part-of: ingress-nginx
spec:
  selector:
    app.kubernetes.io/name: custom-errors
    app.kubernetes.io/part-of: ingress-nginx
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
