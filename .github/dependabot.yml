version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types:
          - 'patch'
          - 'minor'
      major-updates:
        update-types:
          - 'major'
